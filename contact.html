<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contact DailyPulse." />
  <title>DailyPulse | Contact</title>
  <link rel="stylesheet" href="css/style.css" />
  <script defer src="js/main.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">DailyPulse</a>
      <button class="menu-toggle" aria-label="Toggle navigation" aria-expanded="false">☰</button>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="articles.html">Articles</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container section">
    <h1>Contact Us</h1>
    <form id="contactForm" class="contact-form" novalidate>
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" />
        <small class="error" id="nameError"></small>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" />
        <small class="error" id="emailError"></small>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5"></textarea>
        <small class="error" id="messageError"></small>
      </div>

      <button type="submit" class="btn">Send Message</button>
      <p id="formSuccess" class="success"></p>
    </form>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 DailyPulse. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
